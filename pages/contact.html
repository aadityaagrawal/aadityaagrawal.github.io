<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="../style/contactstyle.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
    </style>

</head>

<body>
    <div class="container">

        <div class="randomText">
            <div id="emoji">
                🧑‍💻
            </div>
            In-case of any quieres feel free to disturb me... 
        </div>
        <form action="" class="form">
            <div class="item">
                <label class="label">Name🙍‍♂️</label>
                <input class='answer' type="text">
            </div>
            <div class="item">
                <label class="label">Email-id📩</label>
                <input class='answer' type="text">
            </div>
            <div class="item">
                <label class="label">Subject📄</label>
                <input class='answer' type="text">
            </div>
            <div class="item">
                <label class="label">Message📜</label>
                <textarea name="" id="area" cols="30" rows="7"></textarea>
            </div>
            <div class="sButton">
                <button type="submit">
                    <p class="label">Submit</p>
                </button>
        </form>
    </div>
</body>

</html>
